<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Бабушкины рецепты</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Рецепты моей бабушки</h1>
        <p>Добро пожаловать в мою уютную коллекцию домашних блюд!</p>
    </header>

    <main>
        <div class="recipe-card">
            <h2>Мой фирменный борщ</h2>
            <img src="borsch.jpg" alt="Борщ" class="recipe-photo">
            <p>Это самый вкусный рецепт, который передается в нашей семье.</p>
        </div>

        <div class="recipe-card">
            <h2>Домашние пирожки</h2>
            <img src="pirozhki.jpg" alt="Пирожки" class="recipe-photo">
            <p>Золотистые, сочные и очень ароматные!</p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
